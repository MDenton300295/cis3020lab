<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Dragon Hoard</title>
 <link rel="stylesheet" href="css/style.css">
</head>
<body>
 <h1>Dragon's Hoard Income Calculator</h1>
 <p id="welcome"></p>
<button id="logoutBtn">Log out</button>
<hr>

<div class="panel">
  <h2>Income Calculator</h2>
   <label for="income">Income:</label><br>
   <input type="number" id="income" placeholder="Enter your monthly income"><br><br>
   <label for="rent">Rent:</label><br>
   <input type="number" id="rent" placeholder="Enter monthly rent"><br><br>
   <label for="utilities">Utilities:</label><br>
   <input type="number" id="utilities" placeholder="Enter monthly utilities"><br><br>
   <label for="food">Food:</label><br>
   <input type="number" id="food" placeholder="Enter monthly food cost"><br><br>
   <label for="savings">Savings:</label><br>
   <input type="number" id="savings" placeholder="Enter amount to save"><br><br>
   <label for="other">Other Expenses:</label><br>
   <input type="number" id="other" placeholder="Enter other expenses"><br><br>
    button type="button" onclick="calculateBudget()">Calculate</button>
  <p id="result"></p>
</div>

<script src="js/auth.js"></script>

<script>
requireLogin();

const user = getCurrentUser();
document.getElementById("welcome").textContent = "Logged in as: " + user;
    
document.getElementById("logoutBtn").addEventListener("click", function() {
  signOut();
 window.location.href = "login.html";});

function calculateBudget() {
let income = parseFloat(document.getElementById("income").value) || 0;
let rent = parseFloat(document.getElementById("rent").value) || 0;
let utilities = parseFloat(document.getElementById("utilities").value) || 0;
let food = parseFloat(document.getElementById("food").value) || 0;
let other = parseFloat(document.getElementById("other").value) || 0;
let savings = parseFloat(document.getElementById("savings").value) || 0;
let totalExpenses = rent + utilities + food + other;
let moneyLeft = income - totalExpenses - savings;
let data = {
    income: income,
    rent: rent,
    utilities: utilities,
    food: food,
    other: other,
    savings: savings,
    totalExpenses: totalExpenses,
    moneyLeft: moneyLeft};
saveUserData(data);
localStorage.setItem("showCoins", "yes");
window.location.href = "profile.html";}

</script>
</body>
</html>
